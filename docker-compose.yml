# ══════════════════════════════════════════════════════
# WASITI 2027 — Docker Compose
# ══════════════════════════════════════════════════════

version: '3.8'

services:

  # ══════════════════════════════════════════════════
  # API GATEWAY — البوابة الرئيسية
  # ══════════════════════════════════════════════════
  api-gateway:
    build:
      context: ./containers/api-gateway
      dockerfile: Dockerfile
    container_name: wasity-gateway
    ports:
      - "${API_GATEWAY_PORT}:80"
    depends_on:
      - auth-service
      - user-service
      - company-service
      - listings-service
      - chat-service
      - deals-service
      - notification-service
      - ai-service
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # AUTH SERVICE — المصادقة
  # ══════════════════════════════════════════════════
  auth-service:
    build:
      context: ./containers/auth-service
      dockerfile: Dockerfile
    container_name: wasity-auth
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRES=${JWT_ACCESS_EXPIRES}
      - JWT_REFRESH_EXPIRES=${JWT_REFRESH_EXPIRES}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # USER SERVICE — المستخدمين
  # ══════════════════════════════════════════════════
  user-service:
    build:
      context: ./containers/user-service
      dockerfile: Dockerfile
    container_name: wasity-user
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # COMPANY SERVICE — الشركات
  # ══════════════════════════════════════════════════
  company-service:
    build:
      context: ./containers/company-service
      dockerfile: Dockerfile
    container_name: wasity-company
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # LISTINGS SERVICE — الإعلانات
  # ══════════════════════════════════════════════════
  listings-service:
    build:
      context: ./containers/listings-service
      dockerfile: Dockerfile
    container_name: wasity-listings
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # CHAT SERVICE — المحادثات WebSocket
  # ══════════════════════════════════════════════════
  chat-service:
    build:
      context: ./containers/chat-service
      dockerfile: Dockerfile
    container_name: wasity-chat
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # DEALS SERVICE — الصفقات
  # ══════════════════════════════════════════════════
  deals-service:
    build:
      context: ./containers/deals-service
      dockerfile: Dockerfile
    container_name: wasity-deals
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # NOTIFICATION SERVICE — الإشعارات
  # ══════════════════════════════════════════════════
  notification-service:
    build:
      context: ./containers/notification-service
      dockerfile: Dockerfile
    container_name: wasity-notification
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # AI SERVICE — الذكاء الاصطناعي
  # ══════════════════════════════════════════════════
  ai-service:
    build:
      context: ./containers/ai-service
      dockerfile: Dockerfile
    container_name: wasity-ai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AI_MODEL_PATH=${AI_MODEL_PATH}
      - AI_BATCH_SIZE=${AI_BATCH_SIZE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # FRONTEND — Next.js
  # ══════════════════════════════════════════════════
  frontend:
    build:
      context: ./containers/frontend
      dockerfile: Dockerfile
    container_name: wasity-frontend
    ports:
      - "3000:3000"
    environment:
      - DOCKER=true
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXT_PUBLIC_CDN_URL=${NEXT_PUBLIC_CDN_URL}
    depends_on:
      - api-gateway
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # POSTGRESQL — قاعدة البيانات الأساسية
  # ══════════════════════════════════════════════════
  postgres:
    build:
      context: ./containers/postgres
      dockerfile: Dockerfile
    container_name: wasity-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # POSTGRESQL REPLICA — نسخة احتياطية
  # ══════════════════════════════════════════════════
  postgres-slave:
    image: postgres:16-alpine
    container_name: wasity-postgres-slave
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_slave:/var/lib/postgresql/data
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # REDIS — الكاش + الجلسات + Pub/Sub
  # ══════════════════════════════════════════════════
  redis:
    build:
      context: ./containers/redis
      dockerfile: Dockerfile
    container_name: wasity-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # MINIO — تخزين الملفات (S3-compatible)
  # ══════════════════════════════════════════════════
  minio:
    build:
      context: ./containers/minio
      dockerfile: Dockerfile
    container_name: wasity-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # PROMETHEUS — المراقبة
  # ══════════════════════════════════════════════════
  prometheus:
    build:
      context: ./containers/prometheus
      dockerfile: Dockerfile
    container_name: wasity-prometheus
    ports:
      - "9090:9090"
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # GRAFANA — لوحات المراقبة
  # ══════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: wasity-grafana
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=wasity_admin_2027
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # RABBITMQ — Message Broker
  # ══════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wasity-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=wasity
      - RABBITMQ_DEFAULT_PASS=wasity_rabbit_2027
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - wasity-net
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # WALLET SERVICE — المحافظ المالية
  # ══════════════════════════════════════════════════
  wallet-service:
    build: ./containers/wallet-service
    container_name: wasity-wallet
    ports:
      - "3009:3009"
    environment:
      - DATABASE_URL=postgresql://${WALLET_DB_USER}:${WALLET_DB_PASSWORD}@postgres:5432/wasity
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - wasity-net

volumes:
  pgdata:
  redisdata:
  miniodata:
  prometheus_data:
  grafana_data:
  pgdata_slave:
  rabbitmq_data:

networks:
  wasity-net:
    driver: bridge