# ══════════════════════════════════════════════════
# WASITI 2027 — Prometheus Configuration
# ══════════════════════════════════════════════════

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'wasity-gateway'
    static_configs:
      - targets: ['api-gateway:80']

  - job_name: 'wasity-services'
    static_configs:
      - targets:
        - 'auth-service:3000'
        - 'user-service:3000'
        - 'listings-service:3000'
        - 'chat-service:3000'
        - 'deals-service:3000'
        - 'notification-service:3000'