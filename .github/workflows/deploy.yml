name: QA Robot — WASITI 2027

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install QA Robot Dependencies
        run: |
          cd qa-robot
          npm install

      - name: QA Quick Check
        run: |
          cd qa-robot
          npx ts-node robots/wasiti-robot.ts --quick

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: qa-robot/reports/