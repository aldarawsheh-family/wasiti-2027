worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=register:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream auth_backend { server wasity-auth:3005; }
    upstream listings_backend { server wasity-listings:3004; }
    upstream user_backend { server wasity-user:3001; }
    upstream company_backend { server wasity-company:3002; }
    upstream chat_backend { server wasity-chat:3004; }
    upstream deals_backend { server wasity-deals:3005; }
    upstream notification_backend { server wasity-notification:3006; }
    upstream ai_backend { server wasity-ai:8000; }
    upstream minio_backend { server wasity-minio:9000; }
    upstream wallet_backend { server wasity-wallet:3009; }

    server {
        listen 80;
        server_name localhost;
        resolver 127.0.0.11 valid=30s;

        add_header Access-Control-Allow-Origin "http://localhost:3000";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, tenant-id, X-Request-ID";

        if ($request_method = OPTIONS) { return 204; }

        proxy_set_header Host $http_host;
        proxy_set_header tenant-id $http_tenant_id;
        proxy_set_header user-role $http_user_role;
        proxy_redirect off;

        location /api/auth/ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://auth_backend/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/system/ {
            proxy_pass http://auth_backend/system/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header tenant-id $http_tenant_id;
        }

        location /api/dealer/ {
            proxy_pass http://company_backend/dealer/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header tenant-id $http_tenant_id;
        }

        location /api/booking/ {
            proxy_pass http://company_backend/booking/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header tenant-id $http_tenant_id;
        }

        location /api/transport/ {
            proxy_pass http://company_backend/transport/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header tenant-id $http_tenant_id;
        }

        location /api/shop/ {
            proxy_pass http://company_backend/shop/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header tenant-id $http_tenant_id;
        }

        location /api/listings {
            proxy_pass http://listings_backend/listings;
            proxy_set_header Authorization $http_authorization;
        }
        location /api/listings/ {
            proxy_pass http://listings_backend/listings/;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/users {
            proxy_pass http://user_backend/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header user-id $http_user_id;
        }
        location /api/users/ {
            proxy_pass http://user_backend/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header user-id $http_user_id;
        }

        location /api/companies {
            proxy_pass http://company_backend/;
            proxy_set_header Authorization $http_authorization;
        }
        location /api/companies/ {
            proxy_pass http://company_backend/;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/chat/ {
            proxy_pass http://chat_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Authorization $http_authorization;
        }

        location /api/deals {
            proxy_pass http://deals_backend/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header user-role $http_user_role;
        }
        location /api/deals/ {
            proxy_pass http://deals_backend/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header user-role $http_user_role;
        }

        location /api/notifications/ {
            proxy_pass http://notification_backend/notifications;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/ai/ {
            proxy_pass http://ai_backend/;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/files/ {
            proxy_pass http://minio_backend/wasity-images/;
        }

        location /api/wallet/ {
            proxy_pass http://wallet_backend/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            return 200 '{"message":"WASITI API Gateway"}';
            add_header Content-Type application/json;
        }
    }
}