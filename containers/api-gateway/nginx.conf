worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=register:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream auth_backend { server wasity-auth:3005; }
    upstream listings_backend { server wasity-listings:3004; }
    upstream user_backend { server wasity-user:3001; }
    upstream company_backend { server wasity-company:3002; }
    upstream chat_backend { server wasity-chat:3008; }
    upstream deals_backend { server wasity-deals:3007; }
    upstream notification_backend { server wasity-notification:3006; }
    upstream ai_backend { server wasity-ai:8000; }
    upstream minio_backend { server wasity-minio:9000; }

    server {
        listen 80;
        server_name localhost;

        add_header Access-Control-Allow-Origin "http://localhost:3000";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, tenant-id, X-Request-ID";

        if ($request_method = OPTIONS) { return 204; }

        location /api/auth/ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://auth_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/listings {
            proxy_pass http://listings_backend/listings;
            proxy_set_header Host $host;
        }
        location /api/listings/ {
            proxy_pass http://listings_backend/listings/;
            proxy_set_header Host $host;
        }

        location /api/users/ { proxy_pass http://user_backend/; }
        location /api/companies/ { proxy_pass http://company_backend/; }
        location /api/chat/ { proxy_pass http://chat_backend/; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
        location /api/deals/ { proxy_pass http://deals_backend/; }
        location /api/notifications/ { proxy_pass http://notification_backend/; }
        location /api/ai/ { proxy_pass http://ai_backend/; }
        location /api/files/ { proxy_pass http://minio_backend/wasity-images/; }

        location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
        location / { return 200 '{"message":"WASITI API Gateway"}'; add_header Content-Type application/json; }
    }
}
