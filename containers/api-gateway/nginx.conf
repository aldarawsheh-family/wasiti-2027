# ══════════════════════════════════════════════════
# WASITI 2027 — API Gateway Configuration
# ══════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── السجلات ──
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ── تحسينات الأداء ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── تحديد حجم الطلبات ──
    client_max_body_size 20M;

    # ── الخادم الرئيسي ──
    server {
        listen 80;
        server_name localhost;

        # ── CORS ──
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, tenant-id";

        # ── Auth Service ──
        location /api/auth/ {
            proxy_pass http://auth-service:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── User Service ──
        location /api/users/ {
            proxy_pass http://user-service:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Company Service ──
        location /api/companies/ {
            proxy_pass http://company-service:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Listings Service ──
        location /api/listings/ {
            proxy_pass http://listings-service:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Chat Service (WebSocket) ──
        location /api/chat/ {
            proxy_pass http://chat-service:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Deals Service ──
        location /api/deals/ {
            proxy_pass http://deals-service:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Notification Service ──
        location /api/notifications/ {
            proxy_pass http://notification-service:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── AI Service ──
        location /api/ai/ {
            proxy_pass http://ai-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Health Check ──
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}