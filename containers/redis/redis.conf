# ══════════════════════════════════════════════════
# WASITI 2027 — Redis Configuration
# ══════════════════════════════════════════════════

# ── الشبكة ──
bind 0.0.0.0
port 6379

# ── الثبات ──
appendonly yes
appendfsync everysec

# ── الذاكرة ──
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── الحماية ──
requirepass ""

# ── الإشعارات (Pub/Sub) ──
notify-keyspace-events Ex

# ── الاتصالات ──
tcp-keepalive 300
timeout 0