# WASITI 2027 — GitHub Actions Build Pipeline (Docker Images)
# المسار: infra/ci/build.yml

name: WASITI Docker Build

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ frontend, auth-service, user-service, listings-service, api-gateway ]
        include:
          - service: frontend
            context: containers/frontend
            dockerfile: containers/frontend/Dockerfile
            tag: wasiti-frontend
          - service: auth-service
            context: containers/auth-service
            dockerfile: containers/auth-service/Dockerfile
            tag: wasiti-auth
          - service: user-service
            context: containers/user-service
            dockerfile: containers/user-service/Dockerfile
            tag: wasiti-user
          - service: listings-service
            context: containers/listings-service
            dockerfile: containers/listings-service/Dockerfile
            tag: wasiti-listings
          - service: api-gateway
            context: containers/api-gateway
            dockerfile: containers/api-gateway/Dockerfile
            tag: wasiti-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.tag }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.tag }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.19.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.tag }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # --- فحص النمط البرمجي (اختياري) ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: containers/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./containers/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./containers/frontend
        run: npm run lint || echo "Linting skipped"

  # --- تحديث README (اختياري) ---
  update-readme:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update README badges
        run: |
          echo "<!-- BADGES_UPDATED -->" >> README.md
          echo "![Build Status](https://github.com/${{ github.repository }}/actions/workflows/build.yml/badge.svg)" >> README.md
          echo "![Docker Pulls](https://img.shields.io/docker/pulls/${{ secrets.DOCKER_USERNAME }}/wasiti-frontend)" >> README.md
          
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update README badges [skip ci]"