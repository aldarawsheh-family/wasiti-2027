# WASITI 2027 — GitHub Actions CI/CD Pipeline
# المسار: infra/ci/deploy.yml

name: WASITI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --- 1. وظيفة البناء والاختبار ---
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: containers/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./containers/frontend
        run: npm ci

      - name: Lint code
        working-directory: ./containers/frontend
        run: npm run lint || echo "Linting skipped"

      - name: Run tests
        working-directory: ./containers/frontend
        run: npm test || echo "Tests skipped"

      - name: Build project
        working-directory: ./containers/frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasiti-frontend-build
          path: containers/frontend/.next/

  # --- 2. وظيفة النشر إلى الإنتاج ---
  deploy-to-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasiti-frontend-build
          path: containers/frontend/.next/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./containers/frontend
          file: ./containers/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/wasiti-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/wasiti-frontend:${{ github.sha }}

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/wasiti-frontend:latest
            docker stop wasiti-frontend || true
            docker rm wasiti-frontend || true
            docker run -d \
              --name wasiti-frontend \
              -p 3000:3000 \
              -e NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/wasiti-frontend:latest
            
            docker system prune -f

  # --- 3. وظيفة الإشعارات (اختيارية) ---
  notify:
    needs: deploy-to-production
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send notification to Discord (if configured)
        if: ${{ secrets.DISCORD_WEBHOOK != '' }}
        uses: Ilshidur/action-discord@master
        with:
          args: |
            🚀 **WASITI Deployment Status**
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Status: ${{ job.status }}
            - Deployed by: @${{ github.actor }}